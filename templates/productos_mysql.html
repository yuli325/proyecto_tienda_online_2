{% extends "base.html" %}

{% block title %}Productos MySQL{% endblock %}

{% block content %}

<h2>Productos disponibles</h2>

{% for p in productos %}

<div style="border:1px solid #ccc; padding:15px; margin:15px; width:250px;">
    <h3>{{ p[1] }}</h3>
    <p><b>Precio:</b> ${{ p[2] }}</p>
    <p><b>Descripción:</b> {{ p[3] }}</p>
    <p><b>Stock:</b> {{ p[4] }}</p>
</div>

{% endfor %}

{% endblock %}
