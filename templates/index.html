{% extends "base.html" %}

{% block title %}Inicio - Tienda Online{% endblock %}

{% block content %}
<h2>Bienvenido a nuestra tienda online</h2>
<p>Explora nuestros productos y ofertas:</p>

<div class="productos">
    <div class="producto">
        <img src="{{ url_for('static', filename='img/imagen1.jpg') }}" alt="Laptop">
        <p><a href="{{ url_for('producto', nombre='Laptop') }}">Laptop</a></p>
    </div>
    <div class="producto">
        <img src="{{ url_for('static', filename='img/imagen2.jpg') }}" alt="Tablet">
        <p><a href="{{ url_for('producto', nombre='Tablet') }}">Tablet</a></p>
    </div>
    <div class="producto">
        <img src="{{ url_for('static', filename='img/imagen3.jpg') }}" alt="Mouse">
        <p><a href="{{ url_for('producto', nombre='Mouse') }}">Mouse</a></p>
    </div>
</div>
{% endblock %}
