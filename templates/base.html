<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tienda Online{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <!-- Encabezado -->
    <header>
        <h1>Tienda Online – Catálogo y ofertas</h1>
    </header>

    <!-- Menú de navegación -->
    <nav>
        <a href="{{ url_for('home') }}">Inicio</a> |
        <a href="{{ url_for('about') }}">Acerca de</a> |
        <a href="{{ url_for('agregar') }}">Agregar Producto</a> |
        <a href="{{ url_for('datos') }}">Ver Datos</a> |
        <a href="{{ url_for('contactos') }}">Contacto</a>
    </nav>

    <!-- Contenido dinámico -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Pie de página -->
    <footer>
        <p>&copy; 2026 Tienda Online</p>
    </footer>
</body>
</html>
