{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}

<h2>Editar Producto: {{ producto[1] }}</h2>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ producto[1] }}" required><br><br>

    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" value="{{ producto[2] }}" required><br><br>

    <label>Descripción:</label><br>
    <textarea name="descripcion">{{ producto[3] }}</textarea><br><br>

    <button type="submit">Guardar Cambios</button>

</form>

{% endblock %}
