{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<h2>Editar Producto: {{ producto[1] }}</h2>

<form method="POST">
    <label>Nombre:</label><br>
    <input type="text" value="{{ producto[1] }}" disabled><br><br>

    <label>Cantidad:</label><br>
    <input type="number" name="cantidad" value="{{ producto[2] }}" required><br><br>

    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" required><br><br>

    <button type="submit">Guardar Cambios</button>
</form>
{% endblock %}
